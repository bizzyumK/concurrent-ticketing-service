services:
  app:
    build: .
    container_name: concurrent-ticketing-api
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ticketing
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: SECRET
      REFRESH_SECRET: REFRESH_SECRET
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build: .
    container_name: concurrent-ticketing-worker
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/ticketing
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run worker

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
